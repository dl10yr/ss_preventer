name: ss_preventer
description: Flutter plugin for screenshot prevention and screenshot detection stream on Android/iOS.
version: 0.1.1
homepage: https://github.com/dl10yr/ss_preventer
repository: https://github.com/dl10yr/ss_preventer
issue_tracker: https://github.com/dl10yr/ss_preventer/issues

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.dl10yr.ss_preventer
        pluginClass: SsPreventerPlugin
      ios:
        pluginClass: SsPreventerPlugin
